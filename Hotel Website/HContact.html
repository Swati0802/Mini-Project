<html>
    <head>
        <style>
            .contact{
                padding:60px 10%;
                background:#f9f9f9;
            }

            .contact h2{
                text-align:center;
                font-size:36px;
                margin-bottom:10px;
            }
            .contact h2:hover{
                color: darkblue;
                font-style: italic;
            }

            .contact-tagline{
                text-align:center;
                color:gray;
                margin-bottom:40px;
            }
            .contact-tagline:hover{
                color: darkblue;
            }

            .contact-container{
                display:grid;
                grid-template-columns:1fr 1fr;
                gap:40px;
            }

            .contact-info{
                font-size:16px;
                line-height:30px;
            }

            .contact-info h3:hover{
                color: darkblue;
                font-size: larger;
            }
            .contact-form form{
                display:flex;
                flex-direction:column;
                gap:15px;
            }

            .contact-form input,
            .contact-form textarea{
                padding:10px;
                border:1px solid #ccc;
                border-radius:5px;
                font-size:14px;
            }

            .contact-form button{
                padding:12px;
                border:none;
                background:#c59d5f;
                color:white;
                font-size:16px;
                cursor:pointer;
                border-radius:5px;
                transition: 2s;
            }
            .contact-form button:hover{
                transform: translateY(8px);
            }

            .contact-form button:hover{
                background:#a07d45;
            }

            .map{
                margin-top:40px;
                border-radius:10px;
                overflow:hidden;
            }

        </style>
    </head>
    <body>
        <section id="contact" class="contact">

            <h2>Contact Us</h2>
            <p class="contact-tagline">We are here to assist you. Get in touch with us for inquiries.</p>

            <div class="contact-container">

                <div class="contact-info">

                    <h3>Hotel Information</h3>

                    <p><b>📍 Address:</b> 123 Royal Street, City Center, India</p>
                    <p><b>📞 Phone:</b> +91 98765 43210</p>
                    <p><b>📧 Email:</b> info@serenepalace.com</p>
                    <p><b>🕒 Reception:</b> 24/7 Front Desk Service</p>

                </div>

                <div class="contact-form">

                    <form>

                        <input type="text" placeholder="Your Name" id="name" required>

                        <input type="email" placeholder="Your Email" id="email" required>

                        <input type="tel" placeholder="Phone Number" id="phone" required>

                        <textarea placeholder="Your Message" rows="5" required></textarea>

                        <button type="submit">Send Message</button>

                    </form>

                </div>

            </div>

            <div class="map">
            <iframe src="https://www.google.com/maps?q=Gujarat,India&output=embed"  width="100%"    height="350"  allowfullscreen="" >
            </iframe>
            </div>
            
        </section>
    </body>
</html>
